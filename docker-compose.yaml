services:
  mediamtx:
    image: docker.io/initialcommit/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "9999:9999"
      - "9997:9997"
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
      - ./hooks:/hooks
      - ./logs:/logs