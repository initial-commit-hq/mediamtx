<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Grid — MediaMTX</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #17171a;
      --surface2: #1f1f24;
      --border: #2a2a32;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text: #e4e4e7;
      --text-dim: #71717a;
      --red: #ef4444;
      --green: #22c55e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.3px;
      color: var(--text);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
    }

    .input-group {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .input-group label {
      padding: 0 10px;
      color: var(--text-dim);
      font-size: 12px;
      white-space: nowrap;
      border-right: 1px solid var(--border);
      height: 36px;
      display: flex;
      align-items: center;
    }

    .input-group input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      padding: 0 10px;
      height: 36px;
      font-size: 13px;
      min-width: 0;
    }

    input::placeholder { color: var(--text-dim); }

    .input-host { width: 180px; }
    .input-api  { width: 70px; }
    .input-hls  { width: 70px; }

    .btn {
      height: 36px;
      padding: 0 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-ghost {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-ghost:hover { background: var(--border); }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }

    .status-dot.ok  { background: var(--green); }
    .status-dot.err { background: var(--red); }

    /* ── Stream selector bar ─────────────────────────────────────────────── */
    #stream-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 20px;
      display: none;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stream-tag {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .stream-tag.active {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.15);
      color: var(--text);
    }

    .stream-tag:hover { border-color: var(--accent); }

    .bar-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-right: 4px;
    }

    /* ── Grid ────────────────────────────────────────────────────────────── */
    main {
      flex: 1;
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    /* Dynamic grid columns set by JS */
    .cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cell video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .cell-label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 5px;
      pointer-events: none;
      backdrop-filter: blur(4px);
      letter-spacing: 0.3px;
    }

    .cell-live {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(239, 68, 68, 0.85);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      pointer-events: none;
      letter-spacing: 0.5px;
      display: none;
    }

    .cell.playing .cell-live { display: block; }

    .cell-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-dim);
      font-size: 12px;
    }

    .cell-placeholder svg {
      opacity: 0.3;
    }

    .cell-spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty / error state ─────────────────────────────────────────────── */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-dim);
      text-align: center;
      padding: 40px;
    }

    #empty svg { opacity: 0.25; }

    #empty h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    #empty p { font-size: 13px; max-width: 360px; line-height: 1.6; }

    /* ── Pagination ──────────────────────────────────────────────────────── */
    #pagination {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 0 16px;
    }

    .page-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .page-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 700;
    }

    .page-btn:hover:not(.active) { border-color: var(--accent); }

    /* ── Layout picker ───────────────────────────────────────────────────── */
    .layout-picker {
      display: flex;
      gap: 4px;
    }

    .layout-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 11px;
      font-weight: 700;
    }

    .layout-btn.active {
      background: rgba(59, 130, 246, 0.2);
      border-color: var(--accent);
      color: var(--text);
    }

    .layout-btn:hover:not(.active) { border-color: var(--accent); }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <span class="logo-dot"></span>
    Camera Grid
  </div>

  <div class="controls">
    <div class="input-group">
      <label>Host</label>
      <input class="input-host" id="host" type="text" value="localhost" placeholder="192.168.1.10" />
    </div>
    <div class="input-group">
      <label>API port</label>
      <input class="input-api" id="api-port" type="number" value="9997" min="1" max="65535" />
    </div>
    <div class="input-group">
      <label>WebRTC</label>
      <input class="input-hls" id="webrtc-port" type="number" value="8889" min="1" max="65535" />
    </div>
    <div class="input-group">
      <label>HLS</label>
      <input class="input-hls" id="hls-port" type="number" value="8888" min="1" max="65535" />
    </div>

    <button class="btn btn-primary" id="connect-btn" onclick="connect()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      Connect
    </button>

    <button class="btn btn-ghost" id="refresh-btn" style="display:none" onclick="refreshStreams()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Refresh
    </button>

    <div class="layout-picker" id="layout-picker" style="display:none">
      <button class="layout-btn active" title="1 stream"  data-cols="1" onclick="setLayout(1)">1</button>
      <button class="layout-btn"        title="4 streams" data-cols="2" onclick="setLayout(2)">4</button>
      <button class="layout-btn"        title="9 streams" data-cols="3" onclick="setLayout(3)">9</button>
    </div>

    <div class="status-pill">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Not connected</span>
    </div>
  </div>
</header>

<!-- ── Stream selector ────────────────────────────────────────────────────── -->
<div id="stream-bar"></div>

<!-- ── Empty state ───────────────────────────────────────────────────────── -->
<div id="empty">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
  <h2>No streams loaded</h2>
  <p>Enter your MediaMTX server address and click <strong>Connect</strong> to discover available streams.</p>
</div>

<!-- ── Camera grid ────────────────────────────────────────────────────────── -->
<main id="grid" style="display:none"></main>

<!-- ── Pagination ────────────────────────────────────────────────────────── -->
<div id="pagination"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allStreams    = [];   // all stream names from server
let selectedNames = [];  // user-selected subset (or all if ≤ 9)
let hlsInstances  = {};  // name → HLS instance
let rtcPeers      = {};  // name → RTCPeerConnection
let cols          = 3;   // grid columns (1, 2, or 3)
let page          = 0;   // current page index (for > 9 streams)
const PAGE_SIZE   = 9;
const RTC_TIMEOUT = 6000; // ms before falling back to HLS

// ── Helpers ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function setStatus(text, state /* 'ok' | 'err' | '' */) {
  $('status-text').textContent = text;
  const dot = $('status-dot');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
}

// When served through gui/serve.mjs the page is on localhost so all
// upstream requests are routed via the /proxy/{host}/{port}/... endpoint,
// which adds CORS headers on the way back.  When opened directly from
// disk (file://) we fall back to direct URLs (requires mediamtx CORS config).
function useProxy() {
  return window.location.protocol !== 'file:';
}

function hlsUrl(name) {
  const host = $('host').value.trim();
  const port = $('hls-port').value.trim();
  if (useProxy()) return `/proxy/${host}/${port}/${name}/index.m3u8`;
  return `http://${host}:${port}/${name}/index.m3u8`;
}

function whepUrl(name) {
  const host = $('host').value.trim();
  const port = $('webrtc-port').value.trim();
  if (useProxy()) return `/proxy/${host}/${port}/${name}/whep`;
  return `http://${host}:${port}/${name}/whep`;
}

function apiBase() {
  const host = $('host').value.trim();
  const port = $('api-port').value.trim();
  if (useProxy()) return `/proxy/${host}/${port}`;
  return `http://${host}:${port}`;
}

// ── Connect / fetch streams ────────────────────────────────────────────────
async function connect() {
  setStatus('Connecting…', '');
  teardownAll();

  try {
    const res = await fetch(`${apiBase()}/v3/paths/list`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // mediamtx v3 returns { items: [...] }; each item has a `name` field
    const items = data.items ?? data.paths ?? [];
    allStreams = items
      .map(i => i.name ?? i.id ?? '')
      .filter(Boolean)
      .sort();

    if (allStreams.length === 0) {
      setStatus('No active streams', 'err');
      showEmpty('Server reachable but no active streams found.');
      return;
    }

    setStatus(`${allStreams.length} stream${allStreams.length !== 1 ? 's' : ''}`, 'ok');
    selectedNames = [...allStreams];
    page = 0;

    $('refresh-btn').style.display = 'flex';
    $('layout-picker').style.display = 'flex';

    buildStreamBar();
    renderPage();
  } catch (err) {
    setStatus('Connection failed', 'err');
    showEmpty(`Could not reach MediaMTX API.\n\n${err.message}\n\nCheck host, API port (default 9997), and that the server allows CORS.`);
    console.error(err);
  }
}

async function refreshStreams() {
  await connect();
}

// ── Stream selector bar ────────────────────────────────────────────────────
function buildStreamBar() {
  const bar = $('stream-bar');

  if (allStreams.length <= PAGE_SIZE) {
    bar.style.display = 'none';
    return;
  }

  bar.innerHTML = '<span class="bar-label">Streams:</span>';

  allStreams.forEach(name => {
    const tag = document.createElement('span');
    tag.className = 'stream-tag' + (selectedNames.includes(name) ? ' active' : '');
    tag.textContent = name;
    tag.title = name;
    tag.onclick = () => toggleStream(name, tag);
    bar.appendChild(tag);
  });

  bar.style.display = 'flex';
}

function toggleStream(name, tag) {
  const idx = selectedNames.indexOf(name);
  if (idx === -1) {
    if (selectedNames.length >= PAGE_SIZE) {
      // deselect first selected
      const first = selectedNames.shift();
      bar.querySelector(`[data-stream="${first}"]`)?.classList.remove('active');
    }
    selectedNames.push(name);
    tag.classList.add('active');
  } else {
    selectedNames.splice(idx, 1);
    tag.classList.remove('active');
  }
  page = 0;
  renderPage();
}

// ── Grid rendering ─────────────────────────────────────────────────────────
function setLayout(c) {
  cols = c;
  document.querySelectorAll('.layout-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.cols) === c);
  });
  page = 0;
  renderPage();
}

function renderPage() {
  teardownAll();

  const perPage = cols * cols;
  const names   = selectedNames.length ? selectedNames : allStreams;
  const start   = page * perPage;
  const slice   = names.slice(start, start + perPage);

  if (slice.length === 0) {
    showEmpty('No streams selected.');
    return;
  }

  $('empty').style.display  = 'none';
  const grid = $('grid');
  grid.style.display = 'grid';
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';

  slice.forEach(name => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = `cell-${CSS.escape(name)}`;

    cell.innerHTML = `
      <div class="cell-placeholder">
        <div class="cell-spinner"></div>
        <span>Connecting…</span>
      </div>
      <div class="cell-label">${escHtml(name)}</div>
      <div class="cell-live">LIVE</div>
    `;
    grid.appendChild(cell);
    attachStream(name, cell);
  });

  buildPagination(names.length, perPage);
}

function makeVideo() {
  const v = document.createElement('video');
  v.autoplay    = true;
  v.muted       = true;
  v.playsInline = true;
  v.controls    = false;
  v.style.cssText = 'width:100%;height:100%;object-fit:contain;background:#000;display:none;';
  return v;
}

function onVideoPlaying(video, cell) {
  const placeholder = cell.querySelector('.cell-placeholder');
  if (placeholder) placeholder.remove();
  video.style.display = 'block';
  cell.classList.add('playing');
}

// ── WebRTC (WHEP) ──────────────────────────────────────────────────────────
// Returns a Promise that resolves when the first frame arrives, or rejects
// on negotiation failure / timeout so we can fall back to HLS.
function attachStreamWebRTC(name, cell) {
  return new Promise((resolve, reject) => {
    const pc = new RTCPeerConnection({ iceServers: [] });
    rtcPeers[name] = pc;

    let settled = false;
    const fail = (reason) => {
      if (settled) return;
      settled = true;
      pc.close();
      delete rtcPeers[name];
      reject(new Error(reason));
    };

    const timer = setTimeout(() => fail('WebRTC timeout'), RTC_TIMEOUT);

    pc.addTransceiver('video', { direction: 'recvonly' });
    pc.addTransceiver('audio', { direction: 'recvonly' });

    const video = makeVideo();
    cell.insertBefore(video, cell.querySelector('.cell-label'));

    pc.ontrack = (evt) => {
      if (evt.track.kind === 'video' && !video.srcObject) {
        video.srcObject = evt.streams[0] ?? new MediaStream([evt.track]);
        video.play().catch(() => {});
      }
    };

    video.addEventListener('playing', () => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      onVideoPlaying(video, cell);
      resolve();
    });

    pc.oniceconnectionstatechange = () => {
      const s = pc.iceConnectionState;
      if (s === 'failed' || s === 'disconnected' || s === 'closed') fail(`ICE ${s}`);
    };

    // WHEP negotiation
    (async () => {
      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        // Wait for ICE gathering (max 3 s) so we send a complete offer
        await Promise.race([
          new Promise(r => {
            if (pc.iceGatheringState === 'complete') { r(); return; }
            pc.addEventListener('icegatheringstatechange', function h() {
              if (pc.iceGatheringState === 'complete') { pc.removeEventListener('icegatheringstatechange', h); r(); }
            });
          }),
          new Promise(r => setTimeout(r, 3000)),
        ]);

        const resp = await fetch(whepUrl(name), {
          method:  'POST',
          headers: { 'Content-Type': 'application/sdp' },
          body:    pc.localDescription.sdp,
        });

        if (!resp.ok) { fail(`WHEP HTTP ${resp.status}`); return; }

        const sdp = await resp.text();
        await pc.setRemoteDescription({ type: 'answer', sdp });
      } catch (err) {
        fail(err.message);
      }
    })();
  });
}

// ── HLS fallback ───────────────────────────────────────────────────────────
function attachStreamHLS(name, cell) {
  const video = makeVideo();
  cell.insertBefore(video, cell.querySelector('.cell-label'));

  video.addEventListener('playing', () => onVideoPlaying(video, cell));
  video.addEventListener('error',   () => markError(cell, name, 'Playback error'));

  if (HLS.isSupported()) {
    const hls = new HLS({
      lowLatencyMode: true,
      liveSyncDurationCount: 1,
      liveMaxLatencyDurationCount: 3,
      maxLiveSyncPlaybackRate: 1.5,
    });
    hls.loadSource(hlsUrl(name));
    hls.attachMedia(video);
    hls.on(HLS.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
    hls.on(HLS.Events.ERROR, (_, d) => {
      if (d.fatal) { markError(cell, name, 'Stream unavailable'); hls.destroy(); delete hlsInstances[name]; }
    });
    hlsInstances[name] = hls;
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = hlsUrl(name);
    video.load();
  } else {
    markError(cell, name, 'HLS not supported');
  }
}

// ── Entry point: WebRTC → HLS ──────────────────────────────────────────────
async function attachStream(name, cell) {
  try {
    await attachStreamWebRTC(name, cell);
  } catch (err) {
    console.info(`[${name}] WebRTC failed (${err.message}), falling back to HLS`);
    // Remove the stale video element left by the failed WebRTC attempt
    cell.querySelector('video')?.remove();
    // Reset placeholder in case the cell has no error state yet
    if (!cell.querySelector('.cell-placeholder')) {
      const ph = document.createElement('div');
      ph.className = 'cell-placeholder';
      ph.innerHTML = '<div class="cell-spinner"></div><span>HLS…</span>';
      cell.insertBefore(ph, cell.querySelector('.cell-label'));
    }
    attachStreamHLS(name, cell);
  }
}

function markError(cell, name, msg) {
  const placeholder = cell.querySelector('.cell-placeholder');
  if (placeholder) {
    placeholder.innerHTML = `
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.3"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>${escHtml(msg)}</span>
    `;
  }
}

// ── Pagination ─────────────────────────────────────────────────────────────
function buildPagination(total, perPage) {
  const pag = $('pagination');
  const pages = Math.ceil(total / perPage);

  if (pages <= 1) {
    pag.style.display = 'none';
    return;
  }

  pag.style.display = 'flex';
  pag.innerHTML = '';

  const prev = document.createElement('button');
  prev.className = 'page-btn';
  prev.textContent = '‹';
  prev.onclick = () => { if (page > 0) { page--; renderPage(); } };
  pag.appendChild(prev);

  for (let i = 0; i < pages; i++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (i === page ? ' active' : '');
    btn.textContent = i + 1;
    btn.onclick = (p => () => { page = p; renderPage(); })(i);
    pag.appendChild(btn);
  }

  const next = document.createElement('button');
  next.className = 'page-btn';
  next.textContent = '›';
  next.onclick = () => { if (page < pages - 1) { page++; renderPage(); } };
  pag.appendChild(next);
}

// ── Teardown ───────────────────────────────────────────────────────────────
function teardownAll() {
  Object.values(hlsInstances).forEach(h => { try { h.destroy(); } catch (_) {} });
  Object.values(rtcPeers).forEach(p => { try { p.close(); } catch (_) {} });
  hlsInstances = {};
  rtcPeers = {};
  $('grid').innerHTML = '';
}

// ── Empty state ────────────────────────────────────────────────────────────
function showEmpty(msg) {
  $('grid').style.display = 'none';
  $('stream-bar').style.display = 'none';
  $('pagination').style.display = 'none';
  const empty = $('empty');
  empty.style.display = 'flex';
  empty.querySelector('p').textContent = msg;
}

// ── Escape HTML ────────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Enter key to connect ───────────────────────────────────────────────────
['host','api-port','webrtc-port','hls-port'].forEach(id => {
  $(id).addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
});
</script>
